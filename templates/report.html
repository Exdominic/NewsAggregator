<!DOCTYPE html>
<html>
<head>
    <title>News Aggregator</title>

    <style>
        body {
            background: #eee;
            font-family: Arial, sans-serif;
        }

        .page {
            width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border: 5px solid blue; /* 🔵 PAGE BORDER */
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            color: blue;
        }

        .stats p {
            font-size: 16px;
            margin: 8px 0;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="page">
    <h1> ADMIN DASHBOARD</h1>

    <div class="stats">
        <p><b>Total Users:</b> {{ users }}</p>
        <p><b>Total Favorites:</b> {{ favorites }}</p>
        <p><b>Total Comments:</b> {{ comments }}</p>
        <p><b>Total Likes:</b> {{ likes }}</p>
    </div>

    <h3>Trending News</h3>

    {% for n in trending %}
        <div class="card">
            <b>{{ n.title }}</b><br>
            <small>Clicks: {{ n.clicks }}</small>
        </div>
    {% endfor %}

 <div class="dropdown">
    <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
        Download Report
    </button>

    <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="/report_pdf?type=daily">Daily</a></li>
        <li><a class="dropdown-item" href="/report_pdf?type=weekly">Weekly</a></li>
        <li><a class="dropdown-item" href="/report_pdf?type=monthly">Monthly</a></li>
    </ul>
</div>


    <!-- ACTIVE USERS CHART -->
    <h3>Active Users Over Time</h3>
    <canvas id="activityChart"></canvas>

    

</div>

<script>
fetch('/active_users')
.then(res => res.json())
.then(data => {

    const ctx = document.getElementById('activityChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                label: 'Active Users',
                data: data.values,
                borderWidth: 2,
                fill: false
            }]
        }
    });

});


</script>

</body>
</html>
