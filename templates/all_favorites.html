<!DOCTYPE html>
<html>
<head>
<title>News Aggregator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
.card {
    height: 100%;
    display: flex;
    flex-direction: column;
}

.card-body {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
}

.card img {
    height: 200px;
    object-fit: cover;
}
</style>
<body style="background-color: #0000FF; color: white;">

<!-- 🔵 TOP HEADER -->
<nav class="navbar navbar-dark px-3" style="background-color: #00FF00;">
  <div class="container-fluid position-relative d-flex justify-content-center">
    <span class="navbar-brand mb-0 h1">All Users Saved News</span>
    <a href="/" class="btn btn-outline-light position-absolute start-0 ms-3">Back Home</a>
  </div>
</nav>

<div class="container mt-5">
<div class="row">

{% for n in news %}
<div class="col-md-4 d-flex">
<div class="card mb-3 shadow w-100">

<img src="{{ n.image }}" class="card-img-top">

<div class="card-body d-flex flex-column">

<h5>{{ n.title }}</h5>
<p>{{ n.description }}</p>

<small>User: {{ n.user }}</small>

<a href="{{ n.url }}" target="_blank" class="btn btn-primary">Read</a>

</div>
</div>
</div>

{% endfor %}

<a href="/" class="btn btn-light">Back Home</a>

</div>

</body>
</html>
